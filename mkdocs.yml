site_name: Surface Morphometrics GUI
nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - User Guide:
    - Experiment Setup: guide/experiment-setup.md
    - Surface Mesh Generation: guide/mesh-generation.md
    - Curvature Analysis: guide/curvature-analysis.md
    - Distance & Orientation: guide/distance-orientation.md
    - Visualization: guide/visualization.md
    - Resuming Experiments: guide/resuming-experiments.md
  - About: about.md
site_url: https://baradlab.github.io/surface-morphometrics-gui/
theme:
  name: material
  palette:
    scheme: slate

# Markdown extensions
markdown_extensions:
  - markdown.extensions.abbr
  - markdown.extensions.admonition
  - markdown.extensions.attr_list
  - markdown.extensions.def_list
  - markdown.extensions.footnotes
  - markdown.extensions.md_in_html
  - markdown.extensions.toc:
      permalink: true
      title: On this page
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.emoji
